# Top-level Workspace-Konfiguration. Tooling-Defaults für ruff,
# mypy, pytest werden hier gehalten und von den Sub-Packages
# (server/bridge, server/companion) geerbt.

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["server/bridge/src", "server/companion/src", "tools"]
extend-exclude = [
    "firmware/lib/**",   # MeshCore-Submodul wir nicht linten
    "firmware/scripts/**", # PIO-pre-build-Scripts mit Import-Magic
]

[tool.ruff.lint]
select = [
    "E", "F", "W",       # pycodestyle, pyflakes
    "I",                 # isort
    "UP",                # pyupgrade
    "B",                 # bugbear
    "ASYNC",             # async-correctness
    "S",                 # bandit
    "RET", "SIM",        # return + simplify
    "TID", "PL",         # tidy imports, pylint
    "RUF",               # ruff-spezifisch
]
ignore = [
    "S101",              # assert in Tests OK
    "PLR0913",           # zu viele Argumente — pragmatisch
]

[tool.ruff.lint.flake8-bugbear]
# FastAPI patterns rely on call-in-default for Depends/Form/Query/etc.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Form",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Body",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S", "PLR2004", "B017", "PLC0415"]
# Web-Layer enthält Singleton-Swaps und FastAPI-Konventionen
"**/web/auth_routes.py" = ["PLW0603", "PLC0415"]
"**/db/session.py" = ["PLW0603", "S608"]
# WebSocket-Handler ist linear lang, splittet aber schlechter als er ist
"**/web/bridge_ws.py" = ["PLR0911", "PLR0912", "PLR0915", "S110", "SIM105"]
# CompanionService importiert meshcore_bridge.db lokal (Circular-Vermeidung)
"**/meshcore_companion/service.py" = ["PLC0415", "S110", "SIM105", "PLR0915", "PLR0912", "RUF001"]
# App-Lifespan integriert viele Subsysteme — flache Statementliste OK
"**/web/app.py" = ["PLR0915", "S110", "SIM105"]
# Companion-Routes greifen via app.state — Type-Annotation für Service kommt später
"**/web/companion_routes.py" = ["PLR2004"]
# CLI-Tools sind lineare prozedurale Skripten
"tools/spiegel-tbeam-setup.py" = ["PLR0912", "PLR0915"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_any_unimported = true
plugins = ["pydantic.mypy"]
mypy_path = ["server/bridge/src", "server/companion/src"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --strict-config --import-mode=importlib -m 'not ui'"
asyncio_mode = "auto"
testpaths = ["server/bridge/tests", "server/companion/tests"]
markers = [
    "ui: Browser-basierte UI-Tests (Playwright) — separat ausführen via 'pytest -m ui'",
]
filterwarnings = [
    "error",
    # aiosqlite + multiple-event-loop interactions in TestClient/AsyncClient
    # tests emit unraisable ResourceWarnings on connection __del__ — benign.
    "ignore::ResourceWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
