# Top-level Workspace-Konfiguration. Tooling-Defaults für ruff,
# mypy, pytest werden hier gehalten und von den Sub-Packages
# (server/bridge, server/companion) geerbt.

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["server/bridge/src", "server/companion/src", "tools"]

[tool.ruff.lint]
select = [
    "E", "F", "W",       # pycodestyle, pyflakes
    "I",                 # isort
    "UP",                # pyupgrade
    "B",                 # bugbear
    "ASYNC",             # async-correctness
    "S",                 # bandit
    "RET", "SIM",        # return + simplify
    "TID", "PL",         # tidy imports, pylint
    "RUF",               # ruff-spezifisch
]
ignore = [
    "S101",              # assert in Tests OK
    "PLR0913",           # zu viele Argumente — pragmatisch
]

[tool.ruff.lint.flake8-bugbear]
# FastAPI patterns rely on call-in-default for Depends/Form/Query/etc.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Form",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Body",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S", "PLR2004", "B017", "PLC0415"]
# Web-Layer enthält Singleton-Swaps und FastAPI-Konventionen
"**/web/auth_routes.py" = ["PLW0603", "PLC0415"]
"**/db/session.py" = ["PLW0603"]
# WebSocket-Handler ist linear lang, splittet aber schlechter als er ist
"**/web/bridge_ws.py" = ["PLR0911", "PLR0912", "PLR0915", "S110", "SIM105"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_any_unimported = true
plugins = ["pydantic.mypy"]
mypy_path = ["server/bridge/src", "server/companion/src"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --strict-config"
asyncio_mode = "auto"
testpaths = ["server/bridge/tests", "server/companion/tests"]
filterwarnings = [
    "error",
    # aiosqlite + multiple-event-loop interactions in TestClient/AsyncClient
    # tests emit unraisable ResourceWarnings on connection __del__ — benign.
    "ignore::ResourceWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
