[alembic]
script_location = alembic
prepend_sys_path = src
version_locations = alembic/versions
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60
output_encoding = utf-8

# DB-URL wird programmatisch aus der App-Config gesetzt; hier nur Fallback.
sqlalchemy.url = sqlite:///./meshcore.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
