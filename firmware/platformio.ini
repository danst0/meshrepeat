; PlatformIO-Skelett für die T-Beam-Repeater-Firmware.
; Phase 0: noch kein Build, MeshCore-Submodul fehlt.
;
; Wird in Phase 2 vervollständigt:
;   - lib_deps mit MeshCore + benötigten Bibliotheken
;   - WiFi-Stack-Konfiguration
;   - WebSocket-Client (z.B. Links2004/arduinoWebSockets)

[platformio]
default_envs = tbeam-eu868
src_dir = src
lib_dir = lib

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3

[env:tbeam-eu868]
board = ttgo-t-beam
build_flags =
    ${env.build_flags}
    -DLORA_FREQUENCY=868E6
    -DREGION_EU868=1
; lib_deps werden in Phase 2 ergänzt
