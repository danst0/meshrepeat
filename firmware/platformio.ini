; PlatformIO config für die MeshCore-Spiegel-Repeater-Firmware.
; MeshCore liegt als Submodul unter lib/meshcore und wird per build_as_lib.py
; automatisch in den Build aufgenommen (siehe library.json dort).
;
; Unsere Eigen-Sources liegen unter src/. Das gforkte simple_repeater-Beispiel
; (main.cpp, MyMesh.cpp/h, UITask.cpp/h, RateLimiter.h) wurde minimal erweitert
; um eine WITH_WIFITCP_BRIDGE-Variante (siehe firmware/src/MyMesh.h:25).
;
; Build:
;   cd firmware && pio run -e tbeam_sx1276_wifitcp

[platformio]
default_envs = tbeam_sx1276_wifitcp
src_dir = src

[env:tbeam_sx1276_wifitcp]
platform = platformio/espressif32@6.11.0
framework = arduino
board = ttgo-t-beam
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

board_build.partitions = min_spiffs.csv

build_flags =
  -w -DNDEBUG -DRADIOLIB_STATIC_ONLY=1 -DRADIOLIB_GODMODE=1
  -D ESP32_PLATFORM
  -D MC_VARIANT=lilygo_tbeam_SX1276
  -I lib/meshcore/variants/lilygo_tbeam_SX1276
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D ENABLE_ADVERT_ON_BOOT=1
  -D ENABLE_PRIVATE_KEY_IMPORT=1
  -D ENABLE_PRIVATE_KEY_EXPORT=1
  ; T-Beam V1.1 SX1276 specifics
  -D TBEAM_SX1276
  -D SX127X_CURRENT_LIMIT=120
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D LORA_TX_POWER=20
  -D P_LORA_TX_LED=4
  -D PIN_BOARD_SDA=21
  -D PIN_BOARD_SCL=22
  -D PIN_GPS_RX=12
  -D PIN_GPS_TX=34
  -D PIN_USER_BTN=38
  -D ENV_INCLUDE_GPS=1
  ; Repeater meta
  -D ADVERT_NAME='"MeshCore-Spiegel"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D PERSISTANT_GPS=1
  ; Unsere Bridge
  -D WITH_WIFITCP_BRIDGE=1
  -D FIRMWARE_VERSION='"v0.1.0-bridge"'
  -D FIRMWARE_BUILD_DATE='"2026-04-25"'
  ; RadioLib slim
  -D RADIOLIB_EXCLUDE_CC1101=1 -D RADIOLIB_EXCLUDE_RF69=1 -D RADIOLIB_EXCLUDE_SX1231=1
  -D RADIOLIB_EXCLUDE_SI443X=1 -D RADIOLIB_EXCLUDE_RFM2X=1 -D RADIOLIB_EXCLUDE_SX128X=1
  -D RADIOLIB_EXCLUDE_AFSK=1 -D RADIOLIB_EXCLUDE_AX25=1 -D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -D RADIOLIB_EXCLUDE_MORSE=1 -D RADIOLIB_EXCLUDE_APRS=1 -D RADIOLIB_EXCLUDE_BELL=1
  -D RADIOLIB_EXCLUDE_RTTY=1 -D RADIOLIB_EXCLUDE_SSTV=1

build_src_filter =
  +<*>

lib_ldf_mode = deep+

lib_deps =
  ; MeshCore submodule (lib/meshcore) wird automatisch von PlatformIO erkannt
  ; (library.json + build_as_lib.py).
  SPI
  Wire
  ; ESP32-bundled libs — explizit, damit LDF sie für WebSockets/Bridge findet
  WiFi
  WiFiClientSecure
  Preferences
  jgromes/RadioLib @ ^7.6.0
  rweather/Crypto @ ^0.4.0
  adafruit/RTClib @ ^2.1.3
  melopero/Melopero RV3028 @ ^1.1.0
  electroniccats/CayenneLPP @ 1.6.1
  ; Board-Variant
  lewisxhe/XPowersLib@^0.2.7
  adafruit/Adafruit SSD1306 @ ^2.5.13
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit BusIO @ ^1.16.1
  stevemarple/MicroNMEA @ ^2.0.6
  ; WebSocket-Client für die Bridge
  links2004/WebSockets @ ^2.4.1
