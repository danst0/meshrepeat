; PlatformIO config für die MeshCore-Spiegel-Repeater-Firmware.
;
; MeshCore liegt als Submodul unter lib/meshcore. Wir bauen es NICHT
; als Library (das hat zu kaskadierenden LDF-Problemen geführt — Crypto-
; und WebSocket-Deps wurden nicht propagiert), sondern wir inkludieren
; die nötigen MeshCore-Sources direkt über build_src_filter — analog zur
; Konfiguration im Upstream-Repository (lib/meshcore/platformio.ini ->
; [LilyGo_TBeam_SX1276]).
;
; Build:
;   cd firmware && pio run -e tbeam_sx1276_wifitcp

[platformio]
default_envs = tbeam_sx1276_wifitcp
src_dir = src

[env:tbeam_sx1276_wifitcp]
platform = platformio/espressif32@6.11.0
framework = arduino
board = ttgo-t-beam
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

board_build.partitions = min_spiffs.csv

; MeshCore selbst nicht als Library linken — wir compilen die nötigen
; Sources direkt mit. Sonst greift build_as_lib.py und LDF findet die
; Crypto-Header nicht.
lib_ignore = MeshCore

; Macht jeden lib_deps src/-Pfad global sichtbar, damit MeshCore-Sources
; ihre transitive Header (ed_25519.h aus rweather/Crypto u.ä.) finden.
extra_scripts = pre:scripts/expose_lib_includes.py

build_flags =
  -w -DNDEBUG -DRADIOLIB_STATIC_ONLY=1 -DRADIOLIB_GODMODE=1
  -D ESP32_PLATFORM
  -I lib/meshcore/src
  -I lib/meshcore/variants/lilygo_tbeam_SX1276
  -I lib/meshcore/lib/ed25519
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D ENABLE_ADVERT_ON_BOOT=1
  -D ENABLE_PRIVATE_KEY_IMPORT=1
  -D ENABLE_PRIVATE_KEY_EXPORT=1
  ; T-Beam V1.1 SX1276
  -D TBEAM_SX1276
  -D SX127X_CURRENT_LIMIT=120
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D DISPLAY_CLASS=SSD1306Display
  -D LORA_TX_POWER=20
  -D P_LORA_TX_LED=4
  -D PIN_BOARD_SDA=21
  -D PIN_BOARD_SCL=22
  -D PIN_GPS_RX=12
  -D PIN_GPS_TX=34
  -D PIN_USER_BTN=38
  -D ENV_INCLUDE_GPS=1
  ; Repeater meta
  -D ADVERT_NAME='"MeshCore-Spiegel"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D PERSISTANT_GPS=1
  ; Unsere Bridge
  -D WITH_WIFITCP_BRIDGE=1
  -D FIRMWARE_VERSION='"v0.1.0-bridge"'
  -D FIRMWARE_BUILD_DATE='"2026-04-25"'
  ; RadioLib slim
  -D RADIOLIB_EXCLUDE_CC1101=1 -D RADIOLIB_EXCLUDE_RF69=1 -D RADIOLIB_EXCLUDE_SX1231=1
  -D RADIOLIB_EXCLUDE_SI443X=1 -D RADIOLIB_EXCLUDE_RFM2X=1 -D RADIOLIB_EXCLUDE_SX128X=1
  -D RADIOLIB_EXCLUDE_AFSK=1 -D RADIOLIB_EXCLUDE_AX25=1 -D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -D RADIOLIB_EXCLUDE_MORSE=1 -D RADIOLIB_EXCLUDE_APRS=1 -D RADIOLIB_EXCLUDE_BELL=1
  -D RADIOLIB_EXCLUDE_RTTY=1 -D RADIOLIB_EXCLUDE_SSTV=1

; Wir bringen MeshCore-Sources als Projekt-interne Files mit ein. Pfade
; sind relativ zu src_dir (also "src/" → "../lib/meshcore/...").
; Sources nachgebaut analog Upstream Tbeam_SX1276_repeater env.
build_src_filter =
  +<*>
  +<../lib/meshcore/src/*.cpp>
  +<../lib/meshcore/src/helpers/*.cpp>
  +<../lib/meshcore/src/helpers/esp32/TBeamBoard.cpp>
  +<../lib/meshcore/src/helpers/esp32/ESP32Board.cpp>
  +<../lib/meshcore/src/helpers/radiolib/*.cpp>
  +<../lib/meshcore/src/helpers/bridges/BridgeBase.cpp>
  +<../lib/meshcore/src/helpers/ui/SSD1306Display.cpp>
  +<../lib/meshcore/src/helpers/ui/MomentaryButton.cpp>
  +<../lib/meshcore/src/helpers/sensors>
  +<../lib/meshcore/variants/lilygo_tbeam_SX1276/target.cpp>
  +<../lib/meshcore/lib/ed25519/*.c>

lib_deps =
  ; ESP32-bundled
  SPI
  Wire
  WiFi
  WiFiClientSecure
  Preferences
  ; MeshCore's eigene Deps (aus library.json)
  jgromes/RadioLib @ ^7.6.0
  rweather/Crypto @ ^0.4.0
  adafruit/RTClib @ ^2.1.3
  melopero/Melopero RV3028 @ ^1.1.0
  electroniccats/CayenneLPP @ 1.6.1
  ; Board-Variant
  lewisxhe/XPowersLib@^0.2.7
  adafruit/Adafruit SSD1306 @ ^2.5.13
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit BusIO @ ^1.16.1
  stevemarple/MicroNMEA @ ^2.0.6
  ; WebSocket-Client
  links2004/WebSockets @ ^2.4.1
  ; OTA-Web-Stack (Upstream esp32_ota; ESP32Board.cpp includes AsyncTCP.h)
  ESP32Async/ESPAsyncWebServer @ 3.10.3
  file://lib/meshcore/arch/esp32/AsyncElegantOTA
