name: ci

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.115" "uvicorn[standard]>=0.30" "websockets>=13" \
            "cbor2>=5.6" "pydantic>=2.8" "pydantic-settings>=2.4" \
            "argon2-cffi>=23" "cryptography>=43" "aiosqlite>=0.20" \
            "sqlalchemy>=2.0" "alembic>=1.13" "structlog>=24" \
            "PyYAML>=6.0" "jinja2>=3.1" "python-multipart>=0.0.9" \
            "itsdangerous>=2.2" "pynacl>=1.5" \
            "pytest>=8" "pytest-asyncio>=0.24" "httpx>=0.27" \
            "ruff>=0.6" "mypy>=1.11" "types-PyYAML"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy) — bridge
        run: mypy server/bridge/src
        continue-on-error: true   # Phase 1: erst Code-Stand, dann strict

      - name: Test (pytest)
        env:
          PYTHONPATH: server/bridge/src:server/companion/src
        run: pytest -v

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install "platformio==6.1.16"

      - name: Cache PlatformIO data
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Build firmware (tbeam_sx1276_wifitcp)
        working-directory: firmware
        run: pio run -e tbeam_sx1276_wifitcp

  build-image:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
