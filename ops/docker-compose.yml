# Deployment: cassius:/home/danst/dockers/meshcore/
#
# Reverse-Proxy + TLS macht der existierende traefik2-Stack auf cassius
# (DNS-Challenge via IONOS, certResolver=default). Wir hängen uns nur
# über das externe Netzwerk `traefik_proxy` ein und deklarieren Labels.
#
# Architektur (siehe ADR 005): ein Container `app` trägt Bridge-Daemon,
# Web-Backend (FastAPI) und Companion-Service in einem asyncio-Loop.
# WebSocket auf /api/v1/bridge wird von Traefik HTTP-Router transparent
# durchgereicht — keine Sonder-Label nötig.
#
# Phase 0: Skelett. Image-Build wird in Phase 1 implementiert.

services:
  app:
    build:
      context: ..
      dockerfile: ops/Dockerfile
    container_name: meshcore-app
    restart: unless-stopped
    environment:
      - MESHCORE_CONFIG=/config/app.yaml
      - MESHCORE_DB_PATH=/data/meshcore.sqlite
      - MESHCORE_DB_KEY_FILE=/run/secrets/db_key
      - MESHCORE_LOG_LEVEL=INFO
    volumes:
      - ./config-examples/app.yaml:/config/app.yaml:ro
      - app_data:/data
    secrets:
      - db_key
    networks:
      - traefik_proxy
    labels:
      - traefik.enable=true
      - com.centurylinklabs.watchtower.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.meshcore.rule=Host(`meshcore.dumke.me`)
      - traefik.http.routers.meshcore.entrypoints=web-secure
      - traefik.http.routers.meshcore.tls=true
      - traefik.http.routers.meshcore.tls.certResolver=default
      - traefik.http.services.meshcore.loadbalancer.server.port=8000
      # WebSocket-Uplink (separater Router nur, falls wir später eigene
      # Middleware/Timeouts brauchen — initial reicht der Default-Router):
      # - traefik.http.routers.meshcore-ws.rule=Host(`meshcore.dumke.me`) && PathPrefix(`/api/v1/bridge`)
      # - traefik.http.routers.meshcore-ws.entrypoints=web-secure
      # - traefik.http.routers.meshcore-ws.tls=true
      # - traefik.http.routers.meshcore-ws.tls.certResolver=default
      # - traefik.http.routers.meshcore-ws.service=meshcore
      - flame.type=application
      - flame.name=MeshCore Spiegel
      - flame.url=https://meshcore.dumke.me
      - flame.icon=lan-connect

volumes:
  app_data:

secrets:
  db_key:
    file: ./secrets/db_key

networks:
  traefik_proxy:
    external: true
