# MeshCore-Spiegel App-Config (gemeinsam für Bridge, Web, Companion)
# Pfad im Container: /config/app.yaml (read-only Mount)

server:
  host: "0.0.0.0"
  port: 8000

bridge:
  ws_path: "/api/v1/bridge"
  max_frame_bytes: 8192
  heartbeat_interval_s: 15
  heartbeat_timeout_s: 45            # 3 * heartbeat_interval_s
  reconnect_grace_s: 30
  dedup:
    ttl_s: 300
    lru_capacity: 100000
  policy:
    default: "allow"                 # allow | deny
    rate_limit_pkts_per_s: 50        # pro Site
    rate_limit_burst: 200

web:
  base_url: "https://meshcore.dumke.me"
  session_cookie_name: "meshcore_sid"
  session_idle_timeout_days: 7
  signup:
    enabled: true
    require_email_verification: true
  argon2:
    time_cost: 3
    memory_cost_kib: 65536
    parallelism: 4
  # SMTP für Versand der Verifikations-E-Mails. Wenn enabled=false oder
  # host leer, fällt der Server auf einen Log-only-Sender zurück
  # (Tokens stehen dann in `docker compose logs app | grep send_email`).
  smtp:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    sender: "noreply@meshcore.dumke.me"
    use_tls: false       # implicit TLS (typisch Port 465)
    starttls: true       # explicit STARTTLS (typisch Port 587)

companion:
  enabled: true
  advert_interval_s: 3600            # wie oft eine Identity ihren Advert flutet

# Auto-Übersetzung eingehender Companion-Nachrichten (Ollama lokal).
# Im Browser per Checkbox in der Chat-View an-/ausschaltbar; serverseitig
# wird übersetzt sobald enabled=true und der Ollama-Endpoint erreichbar
# ist. Override per Env: MESHCORE_TRANSLATION__ENABLED=true,
# MESHCORE_TRANSLATION__MODEL=qwen2.5:7b, …
# translation:
#   enabled: false
#   base_url: "http://host.docker.internal:11434"  # cassius: ollama lokal
#   model: "llama3.1:8b"
#   target_lang: "de"
#   target_lang_label: "Deutsch"
#   timeout_s: 20.0
#   min_chars: 3
#   max_chars: 800
#   # Live übersetzen, wenn ein Browser-Tab das Companion-UI offen hat
#   # (oder kürzlich hatte). Sonst holt der Batch-Loop alle X Sekunden
#   # alle noch nicht übersetzten Nachrichten nach. ``0`` deaktiviert
#   # den Batch (reiner Live-Modus, Backlog bleibt liegen).
#   batch_interval_s: 3600
#   # Grace-Period in Sekunden nach dem letzten SSE-Disconnect, in der
#   # Live-Übersetzung weiterhin aktiv bleibt — verhindert Flackern bei
#   # Reload/Tab-Wechsel.
#   live_grace_s: 120.0

storage:
  sqlite_path: "/data/meshcore.sqlite"
  # MESHCORE_DB_KEY_FILE wird via Env-Var aus Docker-Secret geladen

logging:
  level: "INFO"
  format: "json"

metrics:
  enabled: false                     # Phase 5
  bind: "127.0.0.1:9090"
